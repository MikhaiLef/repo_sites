<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title></title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f5f5f5; }
        .title-text { font-size: 28px; font-weight: bold; color: #2c3e50; margin: 10px 0; }
        .regular-text { font-size: 16px; color: #333; margin: 5px 0; }
        img { max-width: 100%; height: auto; margin: 10px 0; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; margin: 5px; border: none; cursor: pointer; font-size: 14px; }
        button:hover { background-color: #45a049; }
        input, textarea { padding: 8px; margin: 5px; width: 300px; }
        .file-manager { border: 2px solid #4CAF50; padding: 10px; margin: 10px 0; max-height: 400px; overflow-y: auto; background-color: #f9f9f9; }
        .file-manager h3 { margin-top: 0; color: #333; }
        .file-item { padding: 8px; margin: 2px 0; cursor: pointer; border-radius: 3px; }
        .file-item:hover { background-color: #e0e0e0; }
        .folder { color: #0066cc; font-weight: bold; }
        .folder::before { content: '📁 '; }
        .file { color: #333; }
        .file::before { content: '📄 '; }
        .path-info { padding: 5px; margin-bottom: 10px; background-color: #e8f5e9; border-radius: 3px; font-size: 12px; }
        .loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
    <div class='regular-text'>hello</div>
</body>
</html>
